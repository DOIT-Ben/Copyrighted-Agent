[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra
markers =
    unit: unit tests for pure domain logic and helper functions
    integration: integration tests across multiple services or pipeline stages
    e2e: end-to-end user journey tests
    contract: tests that lock future module interfaces and expected behaviors
    api: tests for HTTP API behavior
    web: tests for HTML page rendering and main user-facing flows
    zip: tests for archive ingestion and extraction behavior
    parser: tests for file parsing and text extraction
    classifier: tests for material type classification
    review: tests for rule review and AI review behavior
    report: tests for report rendering and artifact generation
    ai: tests for AI review integration and mock-provider behavior
    security: tests for path traversal, unsafe file handling, and privacy safeguards
    performance: tests for latency, throughput, and large-batch handling
    slow: tests that are expected to take noticeably longer than unit tests
